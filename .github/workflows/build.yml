name: Build Mod
 
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
 
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
 
      - name: Check active JDK
        run: |
          java -version
          ./gradlew --version
 
      - name: Build with Gradle
        run: ./gradlew build
 
      - name: List build output (debug)
        run: |
          echo "=== 저장소 전체에서 .jar 찾기 ==="
          find . -name "*.jar" 2>/dev/null
          echo "=== build 디렉토리 전체 구조 ==="
          find build -type f 2>/dev/null || echo "build 디렉토리 자체가 없음"
 
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mod-jar
          path: |
            build/libs/*.jar
            build/devlibs/*.jar
          if-no-files-found: warn
 
